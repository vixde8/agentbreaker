version: "3.9"

services:
  backend:
    build:
      context: ./backend
    container_name: agentbreaker-backend
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - DATABASE_URL=${DATABASE_URL}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: agentbreaker-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped